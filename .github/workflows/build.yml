name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    name: GoReleaser snapshot build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Run GoReleaser (snapshot)
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=sign,publish

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: go-monkill-snapshot
          path: |
            dist/*.tar.gz
            dist/checksums.txt
          if-no-files-found: error
          retention-days: 7
